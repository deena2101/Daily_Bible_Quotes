<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Bible Quotes</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&family=Manjari:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="light-rays"></div>
    <div class="particles" id="particles"></div>

    <!-- Screen 1: Language Selection -->
    <section id="language-screen" class="screen full-center">
        <div class="hero-content">
            <div class="cross-bg"></div>
            <h1 class="app-title">Daily Bible Quotes</h1>
            <p class="subtitle">Find Your Daily Peace</p>
            <div class="lang-selector">
                <button class="lang-btn active-lang" onclick="selectLanguage('en', event)">English</button>
                <button class="lang-btn" onclick="selectLanguage('ml', event)"
                    style="font-family: 'Manjari', sans-serif;">മലയാളം</button>
            </div>
        </div>
    </section>

    <!-- Screen 2: Quotes Display -->
    <section id="quotes-screen" class="screen hidden">
        <header class="glass-header">
            <button class="icon-btn back-btn" onclick="goBack()" aria-label="Go Back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5"></path>
                    <path d="M12 19l-7-7 7-7"></path>
                </svg>
            </button>
            <h2 id="quotes-title" class="screen-title">Daily Bible Quotes</h2>
            <button class="icon-btn shuffle-btn" onclick="shuffleQuotes()" aria-label="Shuffle Quotes">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 3 21 3 21 8"></polyline>
                    <line x1="4" y1="20" x2="21" y2="3"></line>
                    <polyline points="21 16 21 21 16 21"></polyline>
                    <line x1="15" y1="15" x2="21" y2="21"></line>
                    <line x1="4" y1="4" x2="9" y2="9"></line>
                </svg>
            </button>
        </header>

        <main class="quotes-grid" id="quotes-grid">
            <!-- Quote Cards injected via JavaScript -->
        </main>
    </section>

    <script src="script.js"></script>
</body>

</html>
